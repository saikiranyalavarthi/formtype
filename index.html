<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Contact Form</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #0b0b0b;
    font-family: Arial, sans-serif;
  }

  .form-box {
    background: #121212;
    padding: 30px;
    border-radius: 12px;
    width: 320px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
  }

  h2 {
    color: white;
    margin-bottom: 20px;
    text-align: center;
  }

  input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 8px;
    border: none;
    background: #1e1e1e;
    color: white;
    outline: none;
  }

  input::placeholder {
    color: #888;
  }

  button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(45deg, #00ffd5, #00aaff);
    color: black;
    font-weight: bold;
    cursor: pointer;
  }

  .divider {
    text-align: center;
    margin: 20px 0;
    color: #777;
  }
</style>
</head>

<body>

<div class="form-box">
  <h2>Contact Details</h2>

  <!-- YOUR CUSTOM FORM -->
  <form onsubmit="handleSubmit(event)">
    <input type="text" placeholder="Full Name" required />
    <input type="email" placeholder="Email Address" required />
    <input type="tel" placeholder="Phone Number" required />
    <button type="submit">Submit</button>
  </form>

  <div class="divider">OR</div>

  <!-- SELL.DO FORM -->
  <div id="sell-form"></div>

</div>

<script>
function handleSubmit(e) {
  e.preventDefault();
  alert("Form submitted successfully!");
}
</script>

<!-- IMPORTANT: Load script at bottom -->
<script 
  src="//forms.cdn.sell.do/t/forms/648312e68eb6d81861c9a038/69eb2d87a3d855840d2789f2.js" 
  data-form-id="69eb2d87a3d855840d2789f2">
</script>

</body>
</html>
