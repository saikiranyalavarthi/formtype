<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lead Form Page</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: #0b0b0b;
      color: white;
    }

    /* HEADER */
    header {
      position: sticky;
      top: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      padding: 15px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    header h1 {
      font-size: 20px;
      color: #00ffd5;
    }

    header a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
      font-size: 14px;
    }

    /* HERO */
    .hero {
      height: 40vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: radial-gradient(circle at center, #1a1a1a, #000);
    }

    .hero h2 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    .hero p {
      color: #aaa;
    }

    /* FORM SECTION */
    .form-section {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 60px 20px;
    }

    .form-box {
      background: #121212;
      padding: 30px;
      border-radius: 15px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    /* FOOTER */
    footer {
      padding: 20px;
      text-align: center;
      color: #777;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header>
    <h1>Your Brand</h1>
    <nav>
      <a href="#">Home</a>
      <a href="#">Services</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <!-- HERO -->
  <section class="hero">
    <h2>Get Started Today 🚀</h2>
    <p>Fill the form below and our team will contact you shortly</p>
  </section>

  <!-- FORM -->
  <section class="form-section">
    <div class="form-box">

      <script 
        src="//forms.cdn.sell.do/t/forms/648312e68eb6d81861c9a038/69eb2d87a3d855840d2789f2.js" 
        data-form-id="69eb2d87a3d855840d2789f2">
      </script>

    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    © 2026 Your Company. All rights reserved.
  </footer>

</body>
</html>
